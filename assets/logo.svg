<svg xmlns="http://www.w3.org/2000/svg" width="640" height="220" viewBox="0 0 640 220" fill="none" role="img" aria-label="NIKI — hermetic multi-agent coding pipeline">
  <defs>
    <linearGradient id="brand" x1="150" y1="0" x2="490" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7ee787"/>
      <stop offset="0.36" stop-color="#58a6ff"/>
      <stop offset="0.68" stop-color="#d2a8ff"/>
      <stop offset="1" stop-color="#ffa657"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11161d"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.65">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- card -->
  <rect x="1" y="1" width="638" height="218" rx="22" fill="url(#card)"/>
  <rect x="1" y="1" width="638" height="218" rx="22" fill="url(#glow)"/>
  <rect x="1.5" y="1.5" width="637" height="217" rx="21.5" stroke="#30363d" stroke-width="1"/>

  <!-- pipeline motif: Planner -> Coder -> Tester -> Reviewer -> branch -->
  <g transform="translate(213,58)" stroke-linecap="round">
    <!-- flow line -->
    <path d="M18 0 H196" stroke="#30363d" stroke-width="2" stroke-dasharray="2 7"/>
    <!-- nodes (diamonds) -->
    <g stroke-width="3" fill="#0d1117">
      <path d="M18 -9 L27 0 L18 9 L9 0 Z" stroke="#7ee787"/>
      <path d="M77 -9 L86 0 L77 9 L68 0 Z" stroke="#58a6ff"/>
      <path d="M136 -9 L145 0 L136 9 L127 0 Z" stroke="#d2a8ff"/>
      <path d="M195 -9 L204 0 L195 9 L186 0 Z" stroke="#ffa657"/>
    </g>
    <!-- branch out -->
    <path d="M204 0 h20" stroke="#ffa657" stroke-width="2.5"/>
    <circle cx="232" cy="0" r="5.5" fill="#0d1117" stroke="#f0f6fc" stroke-width="2.5"/>
  </g>

  <!-- wordmark -->
  <text x="320" y="150" text-anchor="middle"
        font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace"
        font-size="82" font-weight="800" letter-spacing="10" fill="url(#brand)">NIKI</text>

  <!-- tagline -->
  <text x="322" y="188" text-anchor="middle"
        font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace"
        font-size="13.5" font-weight="500" letter-spacing="5.5" fill="#8b949e">HERMETIC · MULTI-AGENT · CODING PIPELINE</text>
</svg>
