# niki.toml — NIKI configuration

[general]
# Maximum Reviewer → Coder feedback rounds before forced completion
max_revision_rounds = 3
# Task output directory (relative to project root)
output_dir = ".niki"

[providers.anthropic]
api_key = "sk-ant-..."               # Or set ANTHROPIC_API_KEY env var
# base_url = "https://api.anthropic.com"  # Host/base for compatible APIs (or set ANTHROPIC_BASE_URL)
default_model = "claude-sonnet-4-20250514"  # Or set ANTHROPIC_MODEL env var

[providers.openai]
api_key = "sk-..."                    # Or set OPENAI_API_KEY env var
base_url = "https://api.openai.com/v1"  # Host/base for compatible APIs (or set OPENAI_BASE_URL)
default_model = "gpt-4o"                  # Or set OPENAI_MODEL env var

[providers.google]
api_key = "AIza..."                   # Or set GOOGLE_API_KEY env var
default_model = "gemini-2.5-pro"

[providers.ollama]
base_url = "http://localhost:11434"   # Local Ollama instance
default_model = "llama3.1"

# Per-agent model assignment (BYOK mixing)
[agents.planner]
provider = "anthropic"
model = "claude-sonnet-4-20250514"         # Best reasoning for planning

[agents.coder]
provider = "anthropic"
model = "claude-sonnet-4-20250514"

[agents.tester]
provider = "openai"
model = "gpt-4o-mini"               # Cheaper model for test generation

[agents.reviewer]
provider = "anthropic"
model = "claude-sonnet-4-20250514"         # Best reasoning for review

# Optional: data-driven pipeline topology.
# Define your own ordered list of stages instead of the built-in
# Planner -> Coder -> Tester -> Reviewer flow. Each stage binds a role to a
# provider/model. Omit this section (or leave `stages` empty) to use the
# default wiring derived from [agents] above.
#
# [pipeline]
# max_revision_rounds = 3
# stages = [
#   { role = "planner",  provider = "anthropic", model = "claude-sonnet-4-20250514" },
#   { role = "coder",    provider = "anthropic", model = "claude-sonnet-4-20250514" },
#   { role = "tester",   provider = "openai",    model = "gpt-4o-mini" },
#   { role = "reviewer", provider = "anthropic", model = "claude-sonnet-4-20250514" },
#   # Drop a stage from the run with skip = true:
#   # { role = "tester", provider = "openai", model = "gpt-4o-mini", skip = true },
# ]

# Optional: pull extra context into the agents' prompts.
# doc_globs matches files in the project; urls are fetched (best-effort) at run time.
#
# [knowledge]
# doc_globs = ["docs/**/*.md", "README.md"]
# urls = ["https://example.com/architecture.md"]
# max_source_chars = 8000

[docker]
# Base image for agent containers. This must be the pre-baked image built from
# docker/Dockerfile (Wolfi/Chainguard base with git/node/npm/python3 bundled):
#   docker build -t niki-sandbox:24.04 -f docker/Dockerfile .
# A bare upstream image (e.g. ubuntu:24.04) lacks those tools and fails the
# sandbox's tool check at runtime.
base_image = "niki-sandbox:24.04"
# Additional packages to install in agent containers
extra_packages = ["nodejs", "npm", "python3"]
# Memory limit per container
memory_limit = "2g"
# CPU limit per container
cpu_limit = 2.0
